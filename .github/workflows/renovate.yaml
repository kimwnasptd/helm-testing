name: Renovate

on:
  schedule:
    # Run every 2 hours (this is a large repo, avoid excessive runs)
    - cron: "0/2 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        required: true
        default: false
        type: boolean

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - uses: renovatebot/github-action@a7e89c349a53ab0c9d8458eb85f4b415e55848e7 # v44.2.3
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_BINARY_SOURCE: global
