name: Renovate

on:
  schedule:
    # Run every 2 hours (this is a large repo, avoid excessive runs)
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        required: true
        default: false
        type: boolean

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - uses: renovatebot/github-action@a7e89c349a53ab0c9d8458eb85f4b415e55848e7 # v44.2.3
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
          repositories: ${{ github.repository }}
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_BINARY_SOURCE: global
