name: Renovate

on:
  schedule:
    # Run every 2 hours (this is a large repo, avoid excessive runs)
    - cron: "0/2 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no PRs created)"
        required: true
        default: false
        type: boolean

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - uses: renovatebot/github-action@eaf12548c13069dcc28bb75c4ee4610cdbe400c5 # v44.2.6
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
          renovate-version: full
        env:
          LOG_LEVEL: debug
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_BINARY_SOURCE: global
